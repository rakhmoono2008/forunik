/* Layout */
.page{min-height:100vh;background:var(--cream);font-family:'Outfit',sans-serif}
.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:white;border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:'DM Serif Display',serif;font-size:22px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;background:var(--rose);border-radius:50%}
.navLinks{display:flex;gap:2rem}
.navLink{font-size:14px;color:var(--warm-gray);cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:all .2s}
.navLink:hover,.active{color:var(--dark);border-bottom-color:var(--rose)}
.backBtn{background:none;border:1.5px solid var(--border);padding:8px 16px;border-radius:40px;font-family:'Outfit',sans-serif;cursor:pointer;font-size:13px;color:var(--warm-gray)}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 57px)}
.sidebar{background:white;border-right:.5px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.sideUser{display:flex;align-items:center;gap:10px;padding:.75rem;margin-bottom:1rem}
.ava{width:40px;height:40px;border-radius:50%;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--rose);font-size:15px;flex-shrink:0}
.uName{font-size:14px;font-weight:500;margin:0}
.uRole{font-size:12px;color:var(--warm-gray)}
.sideNav{display:flex;flex-direction:column;gap:4px;flex:1}
.sItem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;cursor:pointer;color:var(--warm-gray);transition:all .2s}
.sItem:hover{background:var(--cream);color:var(--dark)}
.sActive{background:var(--rose-light);color:var(--rose);font-weight:500}
.sideCard{background:var(--cream);border-radius:12px;padding:1rem;margin-top:1rem}
.scLabel{font-size:12px;color:var(--warm-gray);margin-bottom:6px}
.scBar{height:6px;background:#E8E4DF;border-radius:40px;overflow:hidden;margin-bottom:6px}
.scFill{height:100%;background:var(--rose);border-radius:40px;transition:width .5s}
.scPct{font-size:12px;font-weight:500;color:var(--rose)}
.main{padding:2rem;background:var(--cream);overflow-y:auto}
.header{margin-bottom:2rem}
.h2{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:4px}
.header p{font-size:14px;color:var(--warm-gray)}

/* AI Banner */
.aiBanner{background:linear-gradient(135deg,#2C2420,#4A3830);border-radius:16px;padding:1.5rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem}
.aiIcon{width:48px;height:48px;background:var(--rose);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.aiText h3{color:white;font-size:16px;font-weight:500;margin-bottom:4px}
.aiText p{color:rgba(255,255,255,.55);font-size:13px}
.aiScore{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 16px;text-align:center;flex-shrink:0}
.scoreNum{color:var(--gold);font-family:'DM Serif Display',serif;font-size:28px}
.scoreLabel{color:rgba(255,255,255,.45);font-size:11px}

/* Home sections */
.homeSection{margin-bottom:2.5rem}
.sectionHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.sectionTitle{font-size:17px;font-weight:500;color:var(--dark)}
.seeAll{font-size:13px;color:var(--rose);cursor:pointer}
.seeAll:hover{text-decoration:underline}

/* Featured courses on home */
.featuredCourses{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.featCard{background:white;border:.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.featCard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.07)}
.featThumb{height:80px;display:flex;align-items:center;justify-content:center;font-size:32px}
.featBody{padding:.75rem 1rem 1rem;display:flex;flex-direction:column;gap:4px;flex:1}
.featCat{font-size:10px;font-weight:500;text-transform:uppercase;color:var(--rose);letter-spacing:.5px}
.featTitle{font-size:14px;font-weight:500;color:var(--dark);line-height:1.3}
.featMeta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--warm-gray);margin-top:2px}
.startBtn{margin-top:auto;padding:7px 0;border-radius:40px;border:1.5px solid var(--rose);background:transparent;color:var(--rose);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;width:100%}
.startBtn:hover{background:var(--rose);color:white}

/* Filters */
.filterRow{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:40px;font-size:13px;cursor:pointer;border:.5px solid var(--border);background:white;color:var(--warm-gray);transition:all .2s}
.chip:hover{border-color:var(--rose);color:var(--rose)}
.chipOn{background:var(--rose);color:white;border-color:var(--rose)}

/* Job cards */
.jobsGrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.jobCard{background:white;border:.5px solid var(--border);border-radius:16px;padding:1.25rem;cursor:pointer;transition:all .2s}
.jobCard:hover{border-color:var(--rose);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.jobTop{display:flex;justify-content:space-between;align-items:start;margin-bottom:.75rem}
.coLogo{width:44px;height:44px;border-radius:10px;background:var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:18px}
.matchBadge{background:var(--sage-light);color:var(--sage);font-size:12px;font-weight:500;padding:4px 10px;border-radius:40px}
.jobTitle{font-size:15px;font-weight:500;margin-bottom:4px}
.jobCo{font-size:13px;color:var(--warm-gray);margin-bottom:.75rem;display:flex;align-items:center;gap:5px}
.verMark{color:#1D6FA5;font-size:13px;font-weight:600}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.tag{background:var(--cream);border:.5px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--warm-gray)}
.jobFooter{display:flex;justify-content:space-between;align-items:center;border-top:.5px solid #F0EDE8;padding-top:.75rem}
.salary{font-size:15px;font-weight:500}
.loc{font-size:12px;color:var(--warm-gray)}

/* Courses */
.coursesGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.courseCard{background:white;border:.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s}
.courseCard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.courseThumb{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px}
.courseBody{padding:1rem}
.courseCat{font-size:10px;font-weight:500;text-transform:uppercase;color:var(--rose);margin-bottom:6px;letter-spacing:.5px}
.courseTitle{font-size:14px;font-weight:500;margin-bottom:6px}
.courseMeta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--warm-gray)}
.certBadge{background:var(--gold-light);color:var(--gold);font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px}

/* Biographies */
.bioGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.bioCard{background:white;border:.5px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s}
.bioCard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.bioAva{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto .75rem}
.bioName{font-size:15px;font-weight:500;margin-bottom:4px}
.bioRole{font-size:12px;color:var(--warm-gray);margin-bottom:.75rem}
.bioQuote{font-size:13px;color:var(--warm-gray);font-style:italic;line-height:1.5}

/* Profile */
.profLayout{display:grid;grid-template-columns:260px 1fr;gap:1.5rem}
.profCard{background:white;border:.5px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center}
.profAva{width:80px;height:80px;border-radius:50%;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:500;color:var(--rose);margin:0 auto 1rem}
.profName{font-size:18px;font-weight:500;margin-bottom:4px}
.profSub{font-size:13px;color:var(--warm-gray);margin-bottom:1rem}
.typeToggle{display:flex;background:var(--cream);border-radius:10px;padding:4px;margin:1rem 0}
.typeBtn{flex:1;padding:7px 8px;border-radius:7px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--warm-gray);font-family:'Outfit',sans-serif;transition:all .2s}
.typeBtnOn{background:white;color:var(--dark);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.typeDesc{font-size:12px;color:var(--warm-gray);margin-bottom:1rem}
.skillsLabel{font-size:13px;font-weight:500;text-align:left;margin-bottom:6px}
.skillsWrap{display:flex;flex-wrap:wrap;gap:6px;text-align:left}
.skillPill{background:var(--rose-light);color:var(--rose);font-size:12px;padding:4px 12px;border-radius:40px}
.profSection{background:white;border:.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.secHead{font-size:15px;font-weight:500;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.editLink{font-size:13px;color:var(--rose);cursor:pointer}
.expItem{display:flex;gap:12px;margin-bottom:1rem}
.expIcon{width:36px;height:36px;background:var(--cream);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.expTitle{font-size:14px;font-weight:500}
.expSub{font-size:13px;color:var(--warm-gray)}
.certsRow{display:flex;gap:8px;flex-wrap:wrap}
